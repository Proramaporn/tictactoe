version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tictactoe-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: tictactoe
      MYSQL_USER: tictactoe_admin
      MYSQL_PASSWORD: admin_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tictactoe-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tictactoe-backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=tictactoe_admin
      - DB_PASSWORD=admin_password
      - DB_NAME=tictactoe
    networks:
      - tictactoe-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tictactoe-frontend
    ports:
      - "5173:5173"
    networks:
      - tictactoe-network
    restart: unless-stopped

networks:
  tictactoe-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
