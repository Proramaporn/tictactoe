version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tictactoe-backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./backend/game.db:/app/game.db
      - ./backend/game.db-shm:/app/game.db-shm
      - ./backend/game.db-wal:/app/game.db-wal
    networks:
      - tictactoe-network
    depends_on:
      - frontend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tictactoe-frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    networks:
      - tictactoe-network
    restart: unless-stopped

networks:
  tictactoe-network:
    driver: bridge

volumes:
  db-volume:
    driver: local
